name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "packages/agent-server/**"
      - "packages/shared/**"
      - "packages/trader/**"
      - "packages/auditor/**"
      - "packages/memory/**"
      - "pnpm-lock.yaml"
      - "pm2.config.cjs"

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/narc

            echo "--- pulling latest ---"
            git fetch origin main
            git checkout main
            git pull origin main

            echo "--- installing deps (backend only) ---"
            pnpm install --frozen-lockfile --filter @narc/shared... --filter @narc/agent-server... --filter @narc/trader... --filter @narc/auditor...

            echo "--- building packages ---"
            pnpm --filter @narc/shared build
            pnpm --filter @narc/agent-server build

            echo "--- restarting agent-server ---"
            pm2 reload pm2.config.cjs --only agent-server --update-env \
              || pm2 start pm2.config.cjs --only agent-server
            pm2 save

            echo "--- done ---"
            pm2 list
